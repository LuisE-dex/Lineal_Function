<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>Lineal Function Calculator</title>
</head>

<body>
<div class="container">

  <h2>Lineal Function Calculator</h2>

  <div class="input-group">
    <h3>First Point</h3>
    <span>(</span>
    <input id="x1" type="number" required placeholder="x">
    <span>;</span>
    <input id="y1" type="number" required placeholder="y">
    <span>)</span>
  </div>

  <div class="input-group">
    <h3>Second Point</h3>
    <span>(</span>
    <input id="x2" type="number" required placeholder="x">
    <span>;</span>
    <input id="y2" type="number" required placeholder="y">
    <span>)</span>
  </div>

  <button id="calcular-btn">Calculate</button>

  <p id="resultado"></p>
  
</div>
<script src="script.js"></script>
</body>
</html>
